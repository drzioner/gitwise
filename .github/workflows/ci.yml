name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: Docs Consistency
    if: >
      ${{ github.event_name != 'push' ||
          !startsWith(github.event.head_commit.message || '', 'docs(changelog): sync CHANGELOG.es from CHANGELOG') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - run: uv sync --group dev
      - run: uv run python scripts/docs/check_i18n_pairs.py
      - run: uv run python scripts/docs/check_md_links.py
      - run: uv run python scripts/docs/check_roadmap_baseline.py
      - run: uv run python scripts/docs/check_schema_catalog.py

  lint:
    name: Lint & Format
    if: >
      ${{ github.event_name != 'push' ||
          !startsWith(github.event.head_commit.message || '', 'docs(changelog): sync CHANGELOG.es from CHANGELOG') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - run: uv sync --group dev
      - run: uv run ruff check gitwise/ tests/
      - run: uv run ruff format --check gitwise/ tests/

  typecheck:
    name: Type Check
    if: >
      ${{ github.event_name != 'push' ||
          !startsWith(github.event.head_commit.message || '', 'docs(changelog): sync CHANGELOG.es from CHANGELOG') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - run: uv sync --group dev
      - run: uv run basedpyright

  test:
    name: Tests (${{ matrix.os }}, ${{ matrix.python-version }})
    if: >
      ${{ github.event_name != 'push' ||
          !startsWith(github.event.head_commit.message || '', 'docs(changelog): sync CHANGELOG.es from CHANGELOG') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: [docs, lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest -q --tb=short --cov=gitwise --cov-report=term-missing --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@968872560f81e7bdde9272853e65f2507c0eca7c # v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  shellcheck:
    name: Shell Lint
    if: >
      ${{ github.event_name != 'push' ||
          !startsWith(github.event.head_commit.message || '', 'docs(changelog): sync CHANGELOG.es from CHANGELOG') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: shellcheck
        run: shellcheck install.sh bin/gitwise

  audit:
    name: Dependency Audit
    if: >
      ${{ github.event_name != 'push' ||
          !startsWith(github.event.head_commit.message || '', 'docs(changelog): sync CHANGELOG.es from CHANGELOG') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - run: uv sync --group dev
      - run: uv run pip-audit
