name: Update homebrew-tap

# Triggers when "Publish to PyPI" completes successfully on a vX.Y.Z tag,
# or manually with --version=X.Y.Z. The workflow bumps url+sha256 in the
# Formula/gitwise.rb of drzioner/homebrew-tap and opens a PR for review.

on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Target version (X.Y.Z, no 'v' prefix) to bump the formula to"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: update-homebrew-tap
  cancel-in-progress: false

jobs:
  update-formula:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve target version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            TAG="$HEAD_BRANCH"
            # head_branch for tag pushes is usually "vX.Y.Z" but can include refs/tags/
            TAG="${TAG##*/}"
            VERSION="${TAG#v}"
          fi

          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::notice::Skipping: resolved version '$VERSION' is not a valid X.Y.Z (likely a non-tag workflow_run)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=update-formula-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get App token (scoped to homebrew-tap)
        id: app-token
        if: steps.version.outputs.skip != 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: drzioner
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Check if PR already exists for this version
        id: check
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          if gh api "repos/drzioner/homebrew-tap/branches/${BRANCH}" >/dev/null 2>&1; then
            echo "::notice::Branch ${BRANCH} already exists in drzioner/homebrew-tap; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: drzioner/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: tap
          # persist-credentials defaults to true so git push in the next step succeeds.

      - name: Fetch sdist metadata from PyPI
        id: sdist
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          URL="https://pypi.org/pypi/gitwise-cli/${VERSION}/json"

          # PyPI propagation can lag a few seconds behind the publish event.
          RESPONSE=""
          for attempt in 1 2 3 4 5 6 7 8; do
            RESPONSE=$(curl -fsSL "$URL" 2>/dev/null) && [ -n "$RESPONSE" ] && break
            echo "::notice::PyPI not ready for v${VERSION} yet (attempt ${attempt}/8). Retrying in 20s..."
            sleep 20
          done

          if [ -z "$RESPONSE" ]; then
            echo "::error::PyPI never returned metadata for v${VERSION} after 8 attempts."
            exit 1
          fi

          SDIST_URL=$(printf '%s' "$RESPONSE" | jq -r '.urls[] | select(.packagetype == "sdist") | .url' | head -1)
          SDIST_SHA=$(printf '%s' "$RESPONSE" | jq -r '.urls[] | select(.packagetype == "sdist") | .digests.sha256' | head -1)

          if [ -z "$SDIST_URL" ] || [ -z "$SDIST_SHA" ]; then
            echo "::error::sdist not found in PyPI response for v${VERSION}."
            exit 1
          fi

          echo "url=${SDIST_URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SDIST_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved sdist: ${SDIST_URL}"

      - name: Bump formula
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        working-directory: tap
        env:
          NEW_URL: ${{ steps.sdist.outputs.url }}
          NEW_SHA: ${{ steps.sdist.outputs.sha256 }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.version.outputs.branch }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          # Resolve bot committer identity (numeric user ID is required for the noreply email).
          BOT_USER_ID=$(gh api "/users/${APP_SLUG}%5Bbot%5D" --jq '.id')

          python3 <<'PYEOF'
          import os
          import re

          path = "Formula/gitwise.rb"
          with open(path) as f:
              content = f.read()

          new_url = os.environ["NEW_URL"]
          new_sha = os.environ["NEW_SHA"]

          # Replace only the first top-level `url "..."` and first `sha256 "..."`.
          # Resources have their own url/sha256 inside `resource ... do ... end` blocks
          # which appear later in the file, so count=1 is safe.
          content, n_url = re.subn(
              r'^(\s*url\s+)"[^"]+"',
              r'\1"' + new_url + '"',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          content, n_sha = re.subn(
              r'^(\s*sha256\s+)"[^"]+"',
              r'\1"' + new_sha + '"',
              content,
              count=1,
              flags=re.MULTILINE,
          )

          if n_url != 1 or n_sha != 1:
              raise SystemExit(f"Expected 1 url and 1 sha256 replacement, got url={n_url} sha256={n_sha}")

          with open(path, "w") as f:
              f.write(content)

          print(f"Updated Formula/gitwise.rb:")
          print(f"  url:    {new_url}")
          print(f"  sha256: {new_sha}")
          PYEOF

          git config user.name  "${APP_SLUG}[bot]"
          git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git config commit.gpgsign false

          git checkout -b "$BRANCH"
          git add Formula/gitwise.rb
          git commit -m "formula: bump gitwise to v${VERSION}" \
                     -m "Auto-generated by drzioner/gitwise update-homebrew-tap workflow after PyPI publish of v${VERSION}." \
                     -m "If runtime dependencies changed since the previous formula version, run 'brew update-python-resources gitwise' locally before merging."
          git push origin "$BRANCH"

      - name: Detect deps changes
        id: deps
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        working-directory: tap
        env:
          VERSION_SPEC: "gitwise-cli==${{ steps.version.outputs.version }}"
          BRANCH: ${{ steps.version.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set +e
          DETECT_OUTPUT=$(python3 <<'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys
          import tempfile

          def parse_formula_resources(path):
              with open(path) as f:
                  content = f.read()
              resources = {}
              for m in re.finditer(
                  r'resource\s+"([^"]+)"\s+do\s+(?:.*?\n)*?\s*url\s+"([^"]+)"',
                  content,
                  re.DOTALL,
              ):
                  name, url = m.group(1), m.group(2)
                  vm = re.search(r"-([0-9][^-/]*)\.tar\.gz(?:[?#]|$)", url)
                  if vm:
                      resources[name.lower()] = vm.group(1)
              return resources

          def resolve_deps(package_spec):
              with tempfile.NamedTemporaryFile(suffix=".json", delete=False) as tmp:
                  report_path = tmp.name
              try:
                  proc = subprocess.run(
                      ["python3", "-m", "pip", "install", "--dry-run",
                       "--ignore-installed", "--report", report_path, package_spec],
                      capture_output=True, text=True,
                  )
                  if proc.returncode != 0:
                      print(f"pip failed: {proc.stderr}", file=sys.stderr)
                      sys.exit(1)
                  with open(report_path) as f:
                      report = json.load(f)
              finally:
                  os.unlink(report_path)
              resolved = {}
              for item in report.get("install", []):
                  metadata = item.get("metadata", {})
                  name = metadata.get("name", "").lower()
                  version = metadata.get("version", "")
                  if name and version and name != package_spec.split("==")[0].lower():
                      resolved[name] = version
              return resolved

          formula_resources = parse_formula_resources("Formula/gitwise.rb")
          resolved = resolve_deps(os.environ["VERSION_SPEC"])

          changes = []
          for name, formula_version in formula_resources.items():
              resolved_version = resolved.get(name)
              if resolved_version is None:
                  changes.append(f"- {name}: in formula ({formula_version}) but NOT resolved by pip — likely removed upstream")
              elif resolved_version != formula_version:
                  changes.append(f"- {name}: {formula_version} -> {resolved_version}")
          for name, version in resolved.items():
              if name not in formula_resources:
                  changes.append(f"- {name}: new dependency resolved at {version} (not in formula)")

          if changes:
              print("DEPS_CHANGED")
              for c in changes:
                  print(c)
              sys.exit(2)
          print("DEPS_OK")
          print(f"All {len(formula_resources)} resources match pip-resolved versions.")
          PYEOF
          )
          DETECT_EXIT=$?
          set -e

          echo "$DETECT_OUTPUT"

          if [ "$DETECT_EXIT" = "0" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "summary=All runtime deps match versions in current formula. Safe to auto-merge." >> "$GITHUB_OUTPUT"
          elif [ "$DETECT_EXIT" = "2" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            CHANGES_LIST=$(printf '%s\n' "$DETECT_OUTPUT" | grep '^-')
            {
              echo "summary<<EOF"
              echo "## ⚠️ Runtime dependencies have changed"
              echo ""
              echo "$CHANGES_LIST"
              echo ""
              echo "Auto-merge is **blocked**. A maintainer must update the resource blocks before merging:"
              echo ""
              echo "1. Check out this branch locally:"
              echo "   \`\`\`bash"
              echo "   git clone https://github.com/drzioner/homebrew-tap"
              echo "   cd homebrew-tap && git checkout ${BRANCH}"
              echo "   \`\`\`"
              echo "2. Resolve the new dep set:"
              echo "   \`\`\`bash"
              echo "   pip install --dry-run --report - gitwise-cli==${VERSION}"
              echo "   \`\`\`"
              echo "3. For each changed/new dep, fetch the sdist URL and sha256 from PyPI:"
              echo "   \`\`\`bash"
              echo "   curl -s https://pypi.org/pypi/<dep-name>/<version>/json | jq -r '.urls[] | select(.packagetype==\"sdist\") | \"\\(.url) \\(.digests.sha256)\"'"
              echo "   \`\`\`"
              echo "4. Update the matching \`resource\` block(s) in \`Formula/gitwise.rb\`, or add new ones."
              echo "5. Verify locally:"
              echo "   \`\`\`bash"
              echo "   brew audit --new --formula gitwise"
              echo "   brew install --build-from-source drzioner/tap/gitwise"
              echo "   brew test drzioner/tap/gitwise"
              echo "   \`\`\`"
              echo "6. Commit and push. The auto-merge step will pick up the updated branch."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::error::Deps detection script failed unexpectedly (exit $DETECT_EXIT)."
            printf '%s\n' "$DETECT_OUTPUT"
            exit 1
          fi

      - name: Open PR
        id: open-pr
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
          SDIST_URL: ${{ steps.sdist.outputs.url }}
          SDIST_SHA: ${{ steps.sdist.outputs.sha256 }}
          BRANCH: ${{ steps.version.outputs.branch }}
          DEPS_SUMMARY: ${{ steps.deps.outputs.summary }}
        run: |
          # Reusable body — kept inline for portability across runner images.
          BODY=$(cat <<EOF
          Auto-generated by [\`update-homebrew-tap\`](https://github.com/drzioner/gitwise/blob/main/.github/workflows/update-homebrew-tap.yml) workflow after PyPI publish of \`v${VERSION}\`.

          ## Changes

          - Bumped formula \`url\` and \`sha256\` to the sdist at \`${SDIST_URL##*/}\` (\`${SDIST_SHA:0:16}…\`).

          ## Deps check

          ${DEPS_SUMMARY}

          EOF
          )

          PR_URL=$(gh pr create \
            --repo drzioner/homebrew-tap \
            --base main \
            --head "$BRANCH" \
            --title "formula: bump gitwise to v${VERSION}" \
            --body "$BODY")

          # Extract the PR number from the returned URL (last path segment).
          PR_NUMBER="${PR_URL##*/}"
          if ! printf '%s' "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "::error::Could not parse PR number from gh pr create output: $PR_URL"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Opened PR #$PR_NUMBER: $PR_URL"

      - name: Auto-merge PR (after diff sanity check)
        # Only auto-merge if deps check passed (changed != true). When deps
        # changed, the PR is left open for human review with the resolution
        # steps documented in the PR body.
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true' && steps.deps.outputs.changed != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.open-pr.outputs.pr_number }}
          EXPECTED_URL: ${{ steps.sdist.outputs.url }}
          EXPECTED_SHA: ${{ steps.sdist.outputs.sha256 }}
        run: |
          # Brief settle so GitHub fully indexes the PR before we diff it.
          sleep 5

          DIFF=$(gh pr diff "$PR_NUMBER" --repo drzioner/homebrew-tap)

          # Count content lines INCLUDING blank-line edits (use awk to skip only
          # diff/file/hunk headers, not bare +/- lines).
          ADDITIONS=$(printf '%s' "$DIFF" | awk '/^\+\+\+|^---|^@@/{next} /^\+/{c++} END{print c+0}')
          DELETIONS=$(printf '%s' "$DIFF" | awk '/^\+\+\+|^---|^@@/{next} /^-/{c++} END{print c+0}')

          echo "PR #$PR_NUMBER diff: +${ADDITIONS}/-${DELETIONS} lines"

          if [ "$ADDITIONS" != "2" ] || [ "$DELETIONS" != "2" ]; then
            echo "::error::Sanity check failed: expected exactly 2 additions and 2 deletions (url + sha256). Got +${ADDITIONS}/-${DELETIONS}. Refusing to auto-merge; leaving PR open for human review."
            exit 1
          fi

          # Validate the 2 added lines are exactly url "<EXPECTED_URL>" and
          # sha256 "<EXPECTED_SHA>" (in any order). grep -F = literal substring
          # match; no regex interpretation of the URL.
          ADDED=$(printf '%s' "$DIFF" | awk '/^\+\+\+|^---|^@@/{next} /^\+/{sub(/^\+/,""); print}')
          if ! printf '%s' "$ADDED" | grep -qF "url \"${EXPECTED_URL}\""; then
            echo "::error::Sanity check failed: additions do not include 'url \"${EXPECTED_URL}\"'. Refusing to auto-merge."
            exit 1
          fi
          if ! printf '%s' "$ADDED" | grep -qF "sha256 \"${EXPECTED_SHA}\""; then
            echo "::error::Sanity check failed: additions do not include 'sha256 \"${EXPECTED_SHA}\"'. Refusing to auto-merge."
            exit 1
          fi

          echo "Sanity check passed: diff contains exactly url + sha256 with expected values. Auto-merging PR #$PR_NUMBER."
          gh pr merge "$PR_NUMBER" \
            --repo drzioner/homebrew-tap \
            --squash --admin \
            --subject "formula: bump gitwise (#${PR_NUMBER})"
