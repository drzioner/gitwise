name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run bump without pushing"
        type: boolean
        default: false

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Bump Version & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && !startsWith(github.event.workflow_run.head_commit.message, 'bump:'))
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - run: uv sync --group dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign false

      - name: Revert guard (abort bump when commits cancel out)
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, skipping revert guard"
            exit 0
          fi

          RANGE="${LAST_TAG}..HEAD"
          REVERTS=$(git log "${RANGE}" --pretty=format:'%h %s' \
            | grep -iE "^[a-f0-9]+ (revert\(|Revert \")" || true)
          NET_DIFF=$(git diff "${RANGE}" --stat -- \
            ':(exclude)CHANGELOG.md' \
            ':(exclude)CHANGELOG.es.md' \
            ':(exclude).github' \
            ':(exclude)uv.lock' \
            | wc -l | awk '{print $1}')

          echo "Reverts found since ${LAST_TAG}:"
          printf '%s\n' "${REVERTS:-(none)}" | sed 's/^/  /'
          echo "Net diff lines (excluding CHANGELOG/.github/uv.lock): ${NET_DIFF}"

          if [ -n "$REVERTS" ] && [ "$NET_DIFF" -eq 0 ]; then
            echo "::error::Aborting bump: ${RANGE} contains revert commit(s) but the net diff (excluding CHANGELOG/.github/uv.lock) is zero. commitizen reads the reverted commit's subject and would bump anyway, producing a release whose CHANGELOG promises changes that the shipped code does not contain."
            echo "::error::Resolution: either re-apply the reverted change via PR so the net diff is non-zero, or remove the revert and its target from history (see https://commitizen-tools.github.io/commitizen/faq/#how-to-revert-a-bump)."
            exit 1
          fi

      - name: Bump version
        id: bump
        run: |
          BUMP_EXIT=0
          uv run cz bump --yes --changelog || BUMP_EXIT=$?

          if [ "$BUMP_EXIT" -eq 21 ]; then
            echo "no_bump=true" >> "$GITHUB_OUTPUT"
            echo "No version increment needed"
            exit 0
          fi

          if [ "$BUMP_EXIT" -ne 0 ]; then
            echo "cz bump failed with exit code $BUMP_EXIT"
            exit 1
          fi

          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="${TAG#v}"
          echo "no_bump=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Guard against empty CHANGELOG section
        if: steps.bump.outputs.no_bump == 'false'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          BODY=$(sed -n "/^## ${TAG} (/,/^## v/{ /^## v/!p; }" CHANGELOG.md)
          SIGNIFICANT=$(printf '%s\n' "$BODY" | grep -cE "^(- |### )" || true)
          if [ "$SIGNIFICANT" -lt 2 ]; then
            echo "::error::Bumped to ${TAG} but CHANGELOG section has fewer than 2 significant lines (headings + bullets). This usually means a stray 'BREAKING CHANGE:' string in a docs/chore commit body triggered the bump without any release-worthy content. Aborting push so a human can decide."
            printf '%s\n' "$BODY"
            exit 1
          fi

      - name: Sync CHANGELOG.es.md
        if: steps.bump.outputs.no_bump == 'false'
        run: uv run python scripts/docs/sync_changelog_es.py

      - name: Commit synchronized CHANGELOG.es.md
        if: steps.bump.outputs.no_bump == 'false'
        run: |
          if ! git diff --quiet -- CHANGELOG.es.md; then
            git add CHANGELOG.es.md
            git commit -m "docs(changelog): sync CHANGELOG.es from CHANGELOG"
          fi

      - name: Push bump commit & tag
        if: steps.bump.outputs.no_bump == 'false' && inputs.dry-run == false
        run: git push --atomic origin main "refs/tags/${{ steps.bump.outputs.tag }}"

      - name: Extract release notes
        if: steps.bump.outputs.no_bump == 'false'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          sed -n "/^## ${TAG} (/,/^## v/{ /^## v/!p; }" CHANGELOG.md > /tmp/release-notes.txt

      - name: Create GitHub Release
        if: steps.bump.outputs.no_bump == 'false' && inputs.dry-run == false
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file /tmp/release-notes.txt \
            --verify-tag
