name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run bump without pushing"
        type: boolean
        default: false

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Bump Version & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && !startsWith(github.event.workflow_run.head_commit.message, 'bump:'))
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - run: uv sync --group dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign false

      - name: Bump version
        id: bump
        run: |
          BUMP_EXIT=0
          uv run cz bump --yes --changelog || BUMP_EXIT=$?

          if [ "$BUMP_EXIT" -eq 21 ]; then
            echo "no_bump=true" >> "$GITHUB_OUTPUT"
            echo "No version increment needed"
            exit 0
          fi

          if [ "$BUMP_EXIT" -ne 0 ]; then
            echo "cz bump failed with exit code $BUMP_EXIT"
            exit 1
          fi

          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="${TAG#v}"
          echo "no_bump=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Sync CHANGELOG.es.md
        if: steps.bump.outputs.no_bump == 'false'
        run: uv run python scripts/docs/sync_changelog_es.py

      - name: Commit synchronized CHANGELOG.es.md
        if: steps.bump.outputs.no_bump == 'false'
        run: |
          if ! git diff --quiet -- CHANGELOG.es.md; then
            git add CHANGELOG.es.md
            git commit -m "docs(changelog): sync CHANGELOG.es from CHANGELOG"
          fi

      - name: Push bump commit & tag
        if: steps.bump.outputs.no_bump == 'false' && inputs.dry-run == false
        run: git push --atomic origin main "refs/tags/${{ steps.bump.outputs.tag }}"

      - name: Extract release notes
        if: steps.bump.outputs.no_bump == 'false'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          sed -n "/^## ${TAG} (/,/^## v/{ /^## v/!p; }" CHANGELOG.md > /tmp/release-notes.txt

      - name: Create GitHub Release
        if: steps.bump.outputs.no_bump == 'false' && inputs.dry-run == false
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file /tmp/release-notes.txt \
            --verify-tag
