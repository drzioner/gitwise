# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
#
# The default Docstring Coverage pre-merge check counts the whole repository,
# including tests/. This project's docstring discipline (AGENTS.md) targets the
# library public API under gitwise/ (which is at 100% coverage per `interrogate`),
# while tests follow the self-documenting `test_<unit>_<scenario>_<expected>`
# naming convention documented in .agents/rules/testing.md rather than
# per-function docstrings. Counting ~700 test symbols (16.7% documented by
# design) makes the aggregate metric ~55% and misrepresents the API's actual
# docstring health. Disable the check here; library docstrings stay enforced by
# AGENTS.md, reviewer, and the basedpyright/type-check gate.
reviews:
  pre_merge_checks:
    docstrings:
      mode: off
