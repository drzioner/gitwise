# CodeRabbit configuration -- https://docs.coderabbit.ai/reference/config
#
# Tuned for gitwise: a Python 3.10+ CLI (ruff + basedpyright + pytest +
# commitizen) with shell scripts (install.sh, bin/gitwise, install.ps1) and
# GitHub Actions workflows. The goal is maximum rigor and insight tuned to
# THIS repo's conventions (see AGENTS.md and .agents/rules/), without enabling
# redundant or conflicting tooling.
#
# Decisions worth flagging are marked with "Why:".

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------

# Reviews in Spanish to match the maintainer's working language. Flip to en-US
# if English-speaking contributors become common.
language: es

# Kept under the 250-char cap. Encodes the repo's strict style rules so every
# review enforces them by default.
tone_instructions: >-
  No emojis or AI-tell unicode (smart/curly quotes, the section sign, arrow
  glyphs) in code or docs; straight ASCII; type hints + PEP 257 docstrings on
  public symbols; pathlib over os.path; basedpyright must pass.

# Keep early-access off: this config governs merge gates, which should rely on
# stable features only. Flip to true to beta-test new CodeRabbit capabilities.
early_access: false

# ---------------------------------------------------------------------------
# Reviews
# ---------------------------------------------------------------------------

reviews:
  # Assertive = more feedback (nitpicks included). Matches "maximum rigor".
  profile: assertive

  # CodeRabbit requests changes, then auto-approves once comments are resolved
  # and no pre-merge check fails. This is the single biggest flow change here:
  # relax to false if it blocks your own PRs too aggressively.
  request_changes_workflow: true

  # Walkthrough + summary features: keep all on (defaults are already true).
  high_level_summary: true
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  suggested_reviewers: true
  poem: false              # Why: AGENTS.md bans emoji/AI-tell flair in output.
  in_progress_fortune: false
  enable_prompt_for_ai_agents: true
  review_status: true
  commit_status: true

  # Show extra transparency (ignored files, suppressed comments, context used).
  review_details: true

  # Do NOT fail the commit status when CodeRabbit itself cannot review (outage,
  # quota, parse error). A third-party tool's own failure must never block a
  # merge -- let real CI gate the PR. commit_status above still reports progress.
  fail_commit_status: false

  # Abort in-progress review when the PR is closed/merged (default true).
  abort_on_close: true

  # --- Path scope -----------------------------------------------------------
  # Exclude auto-generated / vendored content from review and sparse-checkout.
  path_filters:
    - "!CHANGELOG.md"        # generated by commitizen / auto-release workflow
    - "!**/*.lock"
    - "!**/.venv/**"
    - "!**/__pycache__/**"
    - "!**/*.egg-info/**"

  # Path-specific guidance. The canonical rules live in AGENTS.md and
  # .agents/rules/*.md (already fed as review criteria via knowledge_base.
  # code_guidelines below) -- these entries only add path-scoped pointers and
  # the deltas that are NOT obvious from the canonical docs. Avoid restating the
  # full rule set here so the two sources cannot drift.
  path_instructions:
    - path: "gitwise/**/*.py"
      instructions: >-
        Library code. Apply AGENTS.md "Code Style" and .agents/rules/*.md
        strictly. In particular: ruff and basedpyright must pass; no new
        external dependency beyond rich; raise ... from e at I/O boundaries.

    - path: "tests/**/*.py"
      instructions: >-
        pytest tests. Apply .agents/rules/testing.md. Path-specific delta: do
        NOT flag missing docstrings here -- tests are self-documenting via the
        test_<unit>_<scenario>_<expected> naming convention.

    - path: "**/*.sh"
      instructions: >-
        Shell scripts (install.sh, bin/gitwise). Apply .agents/rules/
        shell-scripts.md; shellcheck must pass with zero new findings.

    - path: ".github/workflows/*.yml"
      instructions: >-
        GitHub Actions workflows. Apply .agents/rules/github-actions.md;
        actionlint and zizmor must pass. Never use pull_request_target to
        execute PR content; set explicit minimal permissions.

    - path: "**/*.md"
      instructions: >-
        Documentation. Apply the AGENTS.md "No AI-tell Unicode" rule: straight
        ASCII only (no smart/curly quotes, no curly apostrophes, no section
        sign, no arrow glyphs in prose, no emoji unless explicitly requested).

  # --- Auto review ----------------------------------------------------------
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false            # do not burn review budget on drafts
    base_branches: []
    ignore_usernames: []

  # --- Anti-slop (public GitHub repo) --------------------------------------
  slop_detection:
    enabled: true
    label: slop

  # --- Finishing touches ----------------------------------------------------
  finishing_touches:
    docstrings:
      enabled: true          # follow-up PR with PEP 257 docstrings (library only)
    unit_tests:
      enabled: true
    simplify:
      enabled: true          # off by default; enable for maximum simplification
    custom:
      - name: "ruff format and lint fix"
        instructions: >-
          Run `ruff format` then `ruff check --fix` on the changed Python files
          and commit the result as a separate follow-up commit. Do not change
          behavior; only formatting and safe auto-fixes.
      - name: "modernize type hints"
        instructions: >-
          Convert Optional[T] to T | None and Union[A, B] to A | B across changed
          Python files, keeping every public signature annotated. Do not shell out
          to basedpyright; rely on the repo CI type-check gate for verification.

  # --- Pre-merge checks -----------------------------------------------------
  pre_merge_checks:
    # The author is NOT the only one who can override failing checks.
    override_requested_reviewers_only: false

    # Docstring coverage stays OFF on purpose. The check counts the whole repo
    # including ~700 self-documenting test symbols, which tanks the aggregate
    # metric to ~55% and misrepresents the library API's real coverage (100%
    # under `interrogate`). Library docstrings stay enforced by AGENTS.md,
    # reviewer, and the basedpyright gate.
    docstrings:
      mode: "off"            # quoted: bare `off` is a YAML 1.1 boolean

    # Enforce conventional-commit titles: they feed commitizen semver bumps and
    # the auto-release CHANGELOG. Blocking (error) because a bad title breaks
    # the release pipeline.
    title:
      mode: error
      requirements: >-
        Title must match conventional commits:
        type(scope)!: summary -- type is one of feat, fix, docs, refactor,
        chore, test, ci, perf, build, style, revert. Keep the summary under
        72 characters, lowercase, no trailing period.

    description:
      mode: warning

    issue_assessment:
      mode: warning

    custom_checks:
      - name: "No AI-tell Unicode"
        mode: error
        instructions: >-
          Fail if the diff introduces any of: the section sign (U+00A7),
          smart/curly double quotes (U+201C U+201D), smart/curly single quotes
          or apostrophes (U+2018 U+2019), arrow glyphs used in prose
          (U+2192 and similar), or any emoji, in code, comments, or docs
          unless the maintainer explicitly requested it.

  # --- Tools ----------------------------------------------------------------
  # Only the tools relevant to this stack are listed. Irrelevant linters are
  # left at their default (enabled) but never fire on non-matching files.
  # Why flake8 + pylint are disabled: the repo standardized on ruff (which
  # subsumes both); running all three produces conflicting, contradictory
  # findings. One configured linter is the correct choice.
  tools:
    ruff:
      enabled: true
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    zizmor:
      enabled: true
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    osvScanner:
      enabled: true          # scan pyproject dependencies for vulns
    flake8:
      enabled: false         # superseded by ruff
    pylint:
      enabled: false         # superseded by ruff

# ---------------------------------------------------------------------------
# Chat
# ---------------------------------------------------------------------------

chat:
  auto_reply: true
  art: false                # Why: aligns with the repo's no-emoji/AI-tell rule.
  allow_non_org_members: true

# ---------------------------------------------------------------------------
# Knowledge base
# ---------------------------------------------------------------------------

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    # Per schema, items are glob strings (or {files, applyTo} objects) -- not
    # {path:}. Specifying the list replaces the built-in defaults, so re-list
    # the ones we want plus the repo's scoped rule files.
    filePatterns:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - "**/.agents/rules/*.md"
  learnings:
    scope: local            # repo-only for a public project
    approval_delay: 7       # days to reject a bad learning before auto-apply (public repo)
  issues:
    scope: local
  pull_requests:
    scope: local
  automatic_repository_linking: true   # cross-repo impact (e.g. homebrew tap)

# ---------------------------------------------------------------------------
# Code generation
# ---------------------------------------------------------------------------

code_generation:
  docstrings:
    # Docstrings are code comments -> English (per global rule), even though
    # review prose is Spanish.
    language: en-US
    path_instructions:
      - path: "gitwise/**/*.py"
        instructions: >-
          Generate PEP 257 docstrings: one-line summary for obvious public
          symbols, a second paragraph for non-obvious behavior or side effects.
          Private helpers (_name) may omit them. Use triple double-quotes.
      - path: "tests/**/*.py"
        instructions: >-
          Do not add docstrings; tests are self-documenting via the
          test_<unit>_<scenario>_<expected> naming convention.
  unit_tests:
    path_instructions:
      - path: "gitwise/**/*.py"
        instructions: >-
          Generate pytest tests using the synthetic-temp-repo fixture pattern
          (no mocks). One behavior per test, named
          test_<unit>_<scenario>_<expected>. Invoke the CLI via run_gitwise()
          and assert exit codes and output. Match the style in tests/conftest.py.

# ---------------------------------------------------------------------------
# Issue enrichment
# ---------------------------------------------------------------------------

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels: ["feature", "enhancement", "bug"]
  labeling:
    auto_apply_labels: true
    labeling_instructions:
      - label: feature
        instructions: "New gitwise subcommand or user-facing capability."
      - label: fix
        instructions: "Bug fix for existing behavior."
      - label: refactor
        instructions: "Code restructuring with no behavior change."
      - label: docs
        instructions: "Documentation, AGENTS.md, or rule file changes."
      - label: ci
        instructions: "GitHub Actions or release pipeline changes."
      - label: dependencies
        instructions: "Dependency version changes in pyproject.toml."
